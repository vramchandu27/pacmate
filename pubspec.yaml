name: pacmate
description: PacMate — The ultimate all-in-one travel companion for backpackers.
publish_to: 'none'
# version: major.minor.patch+buildNumber
# Bump +buildNumber every AAB upload to Play Store (must always increase).
# Bump patch for bug fixes, minor for new features, major for breaking changes.
# Current AAB history:
#   1.0.0+1  — Initial release
#   1.0.0+2  — Fix Google Sign-In (Play App Signing SHA-1 added to Firebase)
#   1.0.0+3  — Fix Firestore permission-denied on first Google Sign-In login
version: 1.0.0+3

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  smooth_page_indicator: ^1.2.0+3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  fl_chart: ^0.70.2

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Local Storage
  shared_preferences: ^2.3.5

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  firebase_app_check: ^0.3.1+3
  cloud_functions: ^5.1.3

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Local Notifications (medicine reminders)
  flutter_local_notifications: ^18.0.1

  # Networking
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0

  # Media & Files
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  purchases_flutter: ^8.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/pacmate_icon_final.png"
  remove_alpha_ios: true
  # Android adaptive icon (API 26+): navy background matches brand
  adaptive_icon_background: "#1C3461"
  adaptive_icon_foreground: "assets/icons/pacmate_icon_final.png"
  # Remove old splash icon on Android 12+
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
